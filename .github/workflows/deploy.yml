name: Deploy to julaygroup.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://julaygroup.com
          NODE_ENV: production

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            echo "📥 Pulling latest code..."
            cd /var/www/julaygroup.com
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --prefer-offline

            echo "🔨 Building application..."
            NEXT_PUBLIC_SITE_URL=https://julaygroup.com npm run build

            echo "🚀 Restarting with PM2..."
            pm2 restart julaygroup-website 2>/dev/null || pm2 start ecosystem.config.js
            pm2 save

            echo "✅ Deployed successfully at $(date '+%Y-%m-%d %H:%M:%S UTC')"
