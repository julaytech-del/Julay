name: Deploy to julaygroup.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://julaygroup.com
          NODE_ENV: production

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to AWS EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            echo "📥 Pulling latest code..."
            cd /var/www/julaygroup.com
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --prefer-offline

            echo "🔨 Building application..."
            NEXT_PUBLIC_SITE_URL=https://julaygroup.com npm run build

            echo "🚀 Restarting with PM2..."
            pm2 restart julaygroup-website 2>/dev/null || pm2 start ecosystem.config.js
            pm2 save

            echo "✅ Deployed at $(date '+%Y-%m-%d %H:%M:%S UTC')"
          ENDSSH
